name = "deep-work-api"
main = "src/index.js"
no_bundle = true
compatibility_date = "2024-12-01"

[[kv_namespaces]]
binding = "SESSIONS"
id = "ad823265a8944b9da7a561198f7f3782"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "deep-work-uploads"

[[d1_databases]]
binding = "DB"
database_name = "deep-work-db"
database_id = "92121f3b-dcfb-4fa8-8482-b827224b611d"

[vars]
APP_ORIGIN = "https://love.jamesguldan.com"
STRIPE_MODE = "live"

[triggers]
crons = ["0 * * * *", "0 9 * * *", "0 13 * * 1"]

[observability]
enabled = true

[observability.traces]
enabled = true
destinations = ["sentry-traces"]

[observability.logs]
enabled = true
destinations = ["sentry-logs"]
