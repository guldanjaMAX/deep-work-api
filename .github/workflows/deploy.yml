name: Deploy Worker
on:
  workflow_dispatch:
    # Manual only — do not auto-deploy on push.
    # Worker is deployed via: CLOUDFLARE_API_TOKEN=... npx wrangler deploy
    # Auto-deploy was disabled because wrangler-action was overriding the
    # correct live deployment with a stale bundled version.

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
