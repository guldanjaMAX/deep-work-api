name: Deploy Worker
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify payment routes exist
        run: |
          grep -q "create-payment-intent" src/index.js || (echo "ERROR: payment routes missing from index.js" && exit 1)
          grep -q "fulfill-payment" src/index.js || (echo "ERROR: fulfill-payment route missing" && exit 1)
          echo "Payment routes verified OK"
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 deploy --keep-vars
