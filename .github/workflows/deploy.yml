name: Deploy Worker
on:
  workflow_dispatch:
    # Manual trigger only.
    # Deploy via local wrangler: cd deep-work-api && wrangler deploy
    # Set secrets via CF REST API (not wrangler secret put — that triggers a stale re-deploy):
    #   curl -X PUT https://api.cloudflare.com/client/v4/accounts/{id}/workers/scripts/deep-work-api/secrets
    #     -H "Authorization: Bearer {token}" -d '{"name":"KEY","text":"value","type":"secret_text"}'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest deploy
